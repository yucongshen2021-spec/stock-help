name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint + Build + Regression
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      FLASK_PORT: "3001"
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Python syntax check
        run: |
          python -m compileall -q backend/app backend/launcher.py backend/run.py scripts

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (tsc + vite)
        working-directory: frontend
        run: npm run build

      - name: Start backend in background
        run: |
          nohup python scripts/ci_server.py > backend.log 2>&1 &
          echo $! > .server.pid
          echo "backend PID=$(cat .server.pid)"

      - name: Run regression tests
        run: python scripts/regression_test.py

      - name: Show backend log on failure
        if: failure()
        run: |
          echo "=== backend.log (last 200 lines) ==="
          tail -n 200 backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f .server.pid ]; then
            kill "$(cat .server.pid)" 2>/dev/null || true
          fi
